application.queue.name=document.processing.queue
spring.application.name=document-processor
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=5MB
server.tomcat.max-swallow-size=-1
spring.datasource.url=jdbc:postgresql://localhost:5433/document_processor
spring.datasource.username=nathan
spring.datasource.password=nathan
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=nathan
spring.rabbitmq.password=nathan